name: Unified Dogfooding scans
on:
  schedule:
    - cron: '15 3 * * 1-5' # Run Mon-Fri at 03:15 UTC
  workflow_dispatch:

jobs:
  unified-platform-dogfooding:
    runs-on: github-ubuntu-latest-s
    name: Unified Platform Dogfooding
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.6.14
      - name: Initialize build-logic submodule
        run: git submodule update --init build-logic/common
      - uses: SonarSource/ci-github-actions/build-gradle@v1
        with:
          run-shadow-scans: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          deploy-pull-request: false
      - name: Run IRIS Analysis
        uses: SonarSource/unified-dogfooding-actions/run-iris@v1
        with:
          primary_project_key: "SonarSource_sonar-scala"
          primary_platform: "Next"
          shadow1_project_key: "SonarSource_sonar-scala"
          shadow1_platform: "SQC-EU"
          shadow2_project_key: "SonarSource_sonar-scala"
          shadow2_platform: "SQC-US"
